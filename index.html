<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA - AJAX Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; }
        .search-card { box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-radius: 25px; }
        .loading { opacity: 0.6; }
        .student-card { transition: transform 0.3s, box-shadow 0.3s; }
        .student-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container py-5">
        <!-- Header -->
        <div class="row mb-5">
            <div class="col-12 text-center">
                <i class="bi bi-lightning-charge display-3 text-white mb-4"></i>
                <h1 class="display-4 fw-bold text-white mb-2">Single Page Search</h1>
                <p class="lead text-white-50">AJAX + XMLHttpRequest + JSON API ✨</p>
            </div>
        </div>
        
        <!-- Search -->
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card search-card shadow-lg">
                    <div class="card-body p-5 text-center">
                        <div class="input-group mb-4">
                            <span class="input-group-text bg-primary text-white fs-5">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="searchInput" class="form-control form-control-lg" 
                                   placeholder="🔍 Search students (name, roll, email, course)" value="ME">
                            <button class="btn btn-primary btn-lg" id="searchBtn" onclick="searchStudents()">
                                <i class="bi bi-arrow-clockwise"></i> Search
                            </button>
                        </div>
                        <div id="searchStatus" class="mb-3"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Results -->
        <div class="row mt-5" id="resultsContainer">
            <div class="col-12">
                <div id="noResults" class="text-center py-5 d-none">
                    <i class="bi bi-search display-1 text-muted mb-4"></i>
                    <h3 class="text-muted">No students found</h3>
                    <p class="text-muted">Try another search term</p>
                </div>
                <div id="results" class="row g-4"></div>
            </div>
        </div>
    </div>

    <script>
    // Search using XMLHttpRequest (NO FETCH - as per requirement)
    function searchStudents() {
        const query = document.getElementById('searchInput').value.trim();
        const btn = document.getElementById('searchBtn');
        const status = document.getElementById('searchStatus');
        const results = document.getElementById('results');
        const noResults = document.getElementById('noResults');
        
        // Loading state
        btn.innerHTML = '<i class="bi bi-hourglass-split spinner-border spinner-border-sm me-2"></i>Searching...';
        btn.disabled = true;
        document.body.classList.add('loading');
        status.innerHTML = '<div class="spinner-border spinner-border-sm text-primary me-2"></div>Searching...';
        
        // Create XMLHttpRequest
        const xhr = new XMLHttpRequest();
        xhr.open('GET', `../api-search/api.php?q=${encodeURIComponent(query)}`, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Search';
                btn.disabled = false;
                document.body.classList.remove('loading');
                
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    
                    if (data.status === 'success' && data.results.length > 0) {
                        status.innerHTML = `<span class="badge bg-success fs-6">${data.count} students found</span>`;
                        noResults.classList.add('d-none');
                        
                        // Build student cards
                        let html = '';
                        data.results.forEach(student => {
                            html += `
                                <div class="col-md-6 col-lg-4">
                                    <div class="card student-card h-100 shadow border-0">
                                        <div class="card-body">
                                            <div class="d-flex align-items-start mb-3">
                                                <span class="badge bg-primary fs-6 me-2">#${student.id}</span>
                                                <span class="badge bg-info">${student.roll_no}</span>
                                            </div>
                                            <h5 class="card-title fw-bold">${student.name}</h5>
                                            <p class="card-text text-muted mb-1">${student.email}</p>
                                            <span class="badge bg-success fs-6">${student.course}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        results.innerHTML = html;
                    } else {
                        status.innerHTML = '<span class="badge bg-warning fs-6">0 results</span>';
                        results.innerHTML = '';
                        noResults.classList.remove('d-none');
                    }
                } else {
                    status.innerHTML = '<span class="badge bg-danger fs-6">API Error</span>';
                    results.innerHTML = '';
                    noResults.classList.remove('d-none');
                }
            }
        };
        xhr.send();
    }
    
    // Enter key support
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchStudents();
    });
    
    // Auto search on load
    window.onload = () => setTimeout(searchStudents, 500);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
